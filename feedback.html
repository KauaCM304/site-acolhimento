<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enviar Feedback - Centro de Acolhimento</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: linear-gradient(135deg, #fdfbf7 0%, #f7f3e3 100%); }
    </style>
</head>
<body class="min-h-screen flex flex-col text-slate-800 antialiased">

    <nav class="bg-[#0f3d2e] text-white shadow-md sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-6 h-20 flex items-center justify-between">
            <a href="index.html" class="hover:opacity-80 transition flex items-center space-x-3">
                <div class="bg-white/10 p-2.5 rounded-xl">
                    <i class="fa-solid fa-arrow-left text-xl text-[#4ade80]"></i>
                </div>
                <span class="font-bold text-lg tracking-wide uppercase">Voltar ao Início</span>
            </a>
        </div>
    </nav>

    <main class="flex-grow max-w-3xl mx-auto px-6 py-12 w-full">
        <div class="mb-8 space-y-2">
            <h1 class="text-3xl font-extrabold text-slate-900 flex items-center gap-3">
                <i class="fa-solid fa-star text-amber-500"></i> Compartilhe o seu Feedback
            </h1>
            <p class="text-slate-600 leading-relaxed">Deixe sugestões construtivas para podermos melhorar continuamente.</p>
        </div>

        <div class="bg-white rounded-3xl p-8 shadow-sm border border-slate-100">
            <form onsubmit="enviarFeedback(event)" class="space-y-6">
                <div>
                    <label class="block text-xs font-bold uppercase tracking-wider text-slate-500 mb-2">Classificação do Feedback</label>
                    <select required id="fb-category" class="w-full bg-[#fdfbf7] border border-slate-200 rounded-xl px-4 py-3 text-sm font-medium focus:outline-none focus:border-[#22c55e] focus:bg-white transition">
                        <option value="" disabled selected>Selecione um tópico</option>
                        <option value="Clima Organizacional">Clima Organizacional</option>
                        <option value="Infraestrutura / Materiais">Infraestrutura / Materiais</option>
                        <option value="Processos Internos">Processos Internos</option>
                        <option value="Outros">Outros</option>
                    </select>
                </div>

                <div>
                    <label class="block text-xs font-bold uppercase tracking-wider text-slate-500 mb-2">Sua Mensagem</label>
                    <textarea required id="fb-text" rows="6" placeholder="Escreva sua sugestão de forma detalhada..." class="w-full bg-[#fdfbf7] border border-slate-200 rounded-xl px-4 py-3 text-sm font-medium focus:outline-none focus:border-[#22c55e] focus:bg-white transition"></textarea>
                </div>

                <div id="success-toast" class="hidden p-4 bg-emerald-50 border border-emerald-200 text-emerald-800 rounded-2xl flex flex-col space-y-2 text-sm text-center">
                    <span class="font-bold">🎉 Feedback enviado com sucesso! Obrigado pela cooperação.</span>
                </div>

                <button type="submit" id="btn-submit" class="w-full bg-[#0f3d2e] hover:bg-[#0b2e22] text-white font-bold py-3.5 rounded-xl transition shadow-md">
                    Enviar Feedback
                </button>
            </form>
        </div>
    </main>

    <script>
        window.onload = function() {
            if (!localStorage.getItem('user_name')) {
                window.location.href = 'index.html';
            }
        }

        function enviarFeedback(e) {
            e.preventDefault();
            const category = document.getElementById('fb-category').value;
            const text = document.getElementById('fb-text').value.trim();

            const userEmail = localStorage.getItem('user_email') || '';
            const userName = localStorage.getItem('user_name');
            const userEmpresa = localStorage.getItem('user_empresa');
            
            const dataAtual = new Date().toLocaleString('pt-BR');

            // Salva no histórico individual do usuário (com base no e-mail)
            const keyHistorico = `historico_atividades_${userEmail.toLowerCase()}`;
            const historico = JSON.parse(localStorage.getItem(keyHistorico)) || [];
            historico.push({
                tipo: 'feedback',
                titulo: `Feedback enviado: ${category}`,
                detalhe: text.substring(0, 50) + "...",
                data: dataAtual // Armazena a string contendo o dia e hora completos
            });
            localStorage.setItem(keyHistorico, JSON.stringify(historico));

            // Salva na Base Geral para o Admin Filtrar usando a chave certa: db_feedbacks
            const dbFeedbacks = JSON.parse(localStorage.getItem('db_feedbacks')) || [];
            dbFeedbacks.push({
                data: dataAtual,
                tipo: category,
                mensagem: text,
                usuario: userName,
                email: userEmail,
                empresa: userEmpresa ? userEmpresa.toLowerCase() : ''
            });
            localStorage.setItem('db_feedbacks', JSON.stringify(dbFeedbacks));

            const btn = document.getElementById('btn-submit');
            const toast = document.getElementById('success-toast');
            btn.disabled = true;
            btn.classList.add('hidden');
            toast.classList.remove('hidden');

            setTimeout(() => {
                window.location.href = 'index.html';
            }, 1500);
        }
    </script>
</body>
</html>
